# Pin Python version for all hook environments. The project requires >=3.13;
# pinning to 3.13 keeps hook envs consistent with CI.
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013]

  # Internal-link integrity: catches dangling *relative* markdown links when
  # docs are moved/pruned (enforces knowledge/MAINTENANCE.md §When moving or
  # pruning a doc). Dependency-free, offline, deterministic — checks that local
  # file targets exist (anchor validation is opt-in via --anchors, off here to
  # avoid slug-algorithm noise). Pre-commit passes only the changed .md files,
  # so the hook judges only what a commit touches. The whole-repo gate runs in
  # CI via tests/test_doc_links.py, mirroring check_protected_paths.py.
  - repo: local
    hooks:
      - id: check-doc-links
        name: check internal doc links
        entry: python scripts/check_doc_links.py
        language: system
        pass_filenames: true
        files: \.md$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.23
    hooks:
      - id: uv-lock
