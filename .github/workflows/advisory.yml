name: Advisory CI

# Local-first architecture: the authoritative gate is `just check` run by the
# developer/agent before push. GitHub CI is an advisory double-check.
# Only the lightweight sanity-check job is blocking (verifies `just check`
# was not skipped). `uv.lock` is committed; `uv lock --check` is a blocking
# gate. If it fails, run `uv lock` locally and commit the updated lockfile.
#
# Blocking gates: sanity-check (just check), audit (pip-audit), gitleaks.
# Advisory jobs: pyrefly (type-checking signal).

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install just
        run: |
          # Primary: apt (pre-installed on ubuntu-latest since 24.04).
          # Fallback: just.systems installer (flaky — 403s on CDN outages).
          if command -v just &>/dev/null; then
            echo "just already available: $(just --version)"
          elif sudo apt-get install -y just 2>/dev/null; then
            echo "just installed via apt: $(just --version)"
          else
            curl --proto '=https' --tlsv1.2 -sSf --retry 3 --retry-delay 5 \
              https://just.systems/install.sh | bash -s -- --to /usr/local/bin
          fi

      - name: Verify uv.lock is up-to-date
        # Fails if pyproject.toml was edited but uv.lock was not regenerated
        # (R-1 reproducible-builds). Run `uv lock` locally to fix.
        run: uv lock --check

      - name: Install Python dependencies
        run: uv sync --frozen --extra dev

      - name: Run checks (ruff + deptry + pylint-gap + mypy + authoring-check + pytest, with coverage gate)
        run: uv run just check

      - name: Upload coverage report (read by GitHub Code coverage analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --extra dev
      - name: Run pip-audit (SCA floor)
        run: uv run pip-audit

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks detect
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Pin the gitleaks binary version so pre-commit and CI run the
          # SAME rule set. Must match the `rev:` for gitleaks in
          # .pre-commit-config.yaml. Bump both together.
          GITLEAKS_VERSION: "8.30.1"

  pyrefly:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --extra dev
      - name: Run pyrefly (advisory type-checking signal)
        run: uv run pyrefly check

  # Build the runtime image and smoke-test it AS THE NON-ROOT RUNTIME USER.
  # This single check catches the whole class of "image builds but won't start"
  # failures — e.g. an interpreter the non-root user can't execute, or HOME not
  # resolving on the read-only rootfs — before they reach a deploy.
  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the FA image
        run: docker build -f Dockerfile.fa -t fa-image:ci .
      - name: Smoke-test as the runtime user (numeric 1000:1000, like compose)
        run: |
          set -euo pipefail
          # `fa --version` exercises the full import chain + console script + the
          # venv interpreter, exactly as the compose healthcheck does.
          docker run --rm --user 1000:1000 --read-only \
            --tmpfs /tmp fa-image:ci fa --version
      - name: Smoke-test the egress-proxy subcommand starts (no network/keys)
        run: |
          set -euo pipefail
          # --help must run as the runtime user (proves the subcommand + imports
          # load under the same constraints the proxy container uses).
          docker run --rm --user 1000:1000 --read-only --tmpfs /tmp \
            fa-image:ci fa egress-proxy --help >/dev/null
      - name: Smoke-test session workspace isolation (mount topology)
        run: |
          set -euo pipefail
          # Simulate the production bind-mount topology: /repo (RO) + /sessions (RW).
          # This catches three classes of bugs that unit tests cannot:
          #   1. git clone fails on read-only rootfs (.gitconfig write)
          #   2. /sessions owned by root → Permission denied for uid 1000
          #   3. entrypoint can't create session workspace at startup
          mkdir -p /tmp/fa-ci-repo /tmp/fa-ci-sessions /tmp/fa-ci-state
          cd /tmp/fa-ci-repo
          git init -q
          git config user.email "ci@test" && git config user.name "ci"
          git commit --allow-empty -q -m "init"
          cd -
          sudo chown 1000:1000 /tmp/fa-ci-sessions /tmp/fa-ci-state
          docker run --rm --user 1000:1000 --read-only \
            --tmpfs /tmp --tmpfs /home/fa/.cache --tmpfs /home/fa/.local \
            -v /tmp/fa-ci-repo:/repo:ro \
            -v /tmp/fa-ci-sessions:/sessions \
            -v /tmp/fa-ci-state:/home/fa/.fa \
            -e FA_RUN_ID=ci-smoke \
            fa-image:ci bash -c '
              set -euo pipefail
              # Session clone (what fa-entrypoint.sh does on container start)
              git -c safe.directory='*' clone --local /repo /sessions/ci-smoke
              cd /sessions/ci-smoke
              git checkout -b devin/ci-smoke
              # Verify workspace has the expected structure
              test -d /sessions/ci-smoke/.git
              echo "/sessions/ci-smoke" > /sessions/.active
              test -f /sessions/.active
              # Verify fa CLI works from session workspace
              fa --version
              echo "✅ Session workspace isolation OK"
            '
          rm -rf /tmp/fa-ci-repo /tmp/fa-ci-sessions /tmp/fa-ci-state
