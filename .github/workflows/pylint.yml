name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install system dependencies
      # universal-ctags is a runtime system dep of the ADR-5 chunker; some
      # modules import-guard on tooling that benefits from it being present.
      run: |
        sudo apt-get update
        sudo apt-get install -y universal-ctags
    - name: Install dependencies
      # Install the project itself plus dev extras (pytest, etc.) so pylint can
      # IMPORT every module it analyses. Without this, third-party imports
      # (markdown_it, jsonschema, yaml, bashlex, pytest) raise spurious
      # E0401 import-error and pylint also skips deeper analysis of those files.
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pylint
    - name: Analysing the code with pylint
      # Lint config (disabled checks + fail-under threshold) lives in
      # pyproject.toml under [tool.pylint.*]. The job fails if the score drops
      # below `fail-under`, so real Error/Warning regressions still block,
      # while purely-cosmetic style nits do not.
      run: |
        pylint $(git ls-files '*.py')
