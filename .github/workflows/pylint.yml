name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y universal-ctags
    - name: Install dependencies
      # Install the project + dev extras so pylint can IMPORT every module.
      # Without this, third-party imports (markdown_it, yaml, bashlex, pytest)
      # raise spurious E0401 import-error.
      # TODO: switch to `uv sync --frozen` once uv.lock lands.
      run: uv sync
    - name: Lint src/ (strict; duplicate-code ENABLED)
      # Production code is held to the strict profile in [tool.pylint.*]
      # (pyproject.toml). duplicate-code (R0801) stays ON here because
      # copy-paste-and-tweak is the #1 LLM-agent code smell.
      run: |
        uv run pylint $(git ls-files 'src/*.py' 'verifiers/*.py')
    - name: Lint tests/ (relaxed; duplicate-code DISABLED)
      # Tests use pytest idioms (fixtures shadow names, parallel scaffolding)
      # that are legitimately "duplicated"; relax via .pylintrc-tests.
      run: |
        uv run pylint --rcfile=.pylintrc-tests $(git ls-files 'tests/*.py')
