name: CI

# Single test+coverage source of truth. `make check` runs ruff, mypy, and
# pytest; pytest produces coverage.xml (via pyproject addopts) which is both
# (a) gated at >=90% by [tool.coverage.report] fail_under, and (b) uploaded
# below so GitHub's "Code coverage analysis" feature can read it.
#
# pylint runs separately in pylint.yml; mutation testing in tests.yml.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: make install

      - name: Run checks (ruff + mypy + pytest, with coverage gate)
        run: make check

      - name: Upload coverage report (read by GitHub Code coverage analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
