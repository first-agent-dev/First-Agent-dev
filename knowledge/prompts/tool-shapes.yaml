  handoff_one_liner: |
    The previous role spoke as a GLM-family model emitting raw
    JSON tool calls and string-replace edits. Ignore that shape;
    use the tool shape native to your own family.

kimi-family:
  family: kimi
  shape:
    edit: string_replace
    tool_call_format: openai_function
  handoff_one_liner: |
    The previous role spoke as a Kimi-family model using string-
    replace edits and OpenAI-compatible function-calling. Ignore
    that shape; use the tool shape native to your own family.
