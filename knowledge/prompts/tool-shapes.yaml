    tool_call_format: openai_function
  handoff_one_liner: |
    The previous role spoke as a DeepSeek-family model using
    patch-based edits and OpenAI-compatible function-calling.
    Ignore that shape; use the tool shape native to your own
    family.

glm-family:
  family: glm
  shape:
    edit: string_replace
