# Docker Compose for First-Agent 24/7 deployment
# Place this in ~/fa/workspace/First-Agent-dev/ or ~/fa/
# Run: docker compose -f docker-compose.fa.yml up -d

services:
  first-agent:
    build:
      context: .
      dockerfile: Dockerfile.fa
    container_name: first-agent
    hostname: first-agent
    init: true
    restart: unless-stopped

    # Resource limits for i5-1235U / 16GB host
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
          pids: 512
        reservations:
          cpus: '1.0'
          memory: 512M

    # Isolation hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No cap_add: the agent runs as a single non-root uid and performs only file
    # I/O + git as that uid. CHOWN/SETUID/SETGID were build-time needs (uv/just
    # run as root during build), never runtime — granting them at runtime widens
    # the blast radius for no benefit. Re-add a specific cap only if a concrete
    # runtime failure proves it is required.
    user: "1000:1000"

    # Environment
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - UV_CACHE_DIR=/tmp/uv-cache
      # PYTHONPATH is set by fa-entrypoint.sh (it prepends /workspace/src); do not
      # also set it here or it ends up duplicated (/workspace/src:/workspace/src).
      # Default is inspectable stand-by. For a deliberate one-shot
      # startup run, set FA_AUTO_RUN=1 plus FA_TASK or FA_TASK_FILE
      # in .env.fa (or pass them explicitly with docker compose run -e).
      - FA_WORKSPACE=/workspace
      - FA_CONTAINER_NAME=first-agent
      # Use deploy key exclusively; ignore any other SSH keys in the container.
      # BatchMode=yes + StrictHostKeyChecking=accept-new prevent interactive
      # prompts that would HANG the headless container on a host-key change.
      - GIT_SSH_COMMAND=ssh -i /run/secrets/git_key -o IdentitiesOnly=yes -o UserKnownHostsFile=/run/secrets/known_hosts -o StrictHostKeyChecking=accept-new -o BatchMode=yes
      # Secret isolation (ADR-12, Option C — egress-injection proxy):
      # The agent container holds NO LLM provider keys. It reaches providers
      # ONLY through the fa-egress-proxy service, which injects the real key
      # outside this container. FA_EGRESS_PROXY_URL is a routing address, not a
      # secret; FA_PROXY_TOKEN_FILE points at the (non-key) fa->proxy token.
      - FA_EGRESS_PROXY_URL=http://fa-egress-proxy:8080
      - FA_PROXY_TOKEN_FILE=/run/secrets/fa_proxy_token
    # NOTE: .env.fa here holds ONLY non-secret runtime controls (FA_AUTO_RUN,
    # FA_TASK, FA_ROLE, ...). LLM API keys live ONLY in the proxy container.
    env_file:
      - path: ./.env.fa
        required: false

    # The agent must not start before the key-injecting proxy is healthy.
    depends_on:
      fa-egress-proxy:
        condition: service_healthy

    # Volumes
    volumes:
      # Source code (bind-mount from host)
      - type: bind
        source: /srv/first-agent/repo/First-Agent-dev
        target: /workspace
        read_only: false
      # FA state (persistent) — ~/.fa for config.yaml, runs, drafts, history.
      # Routing is mounted as a separate read-only file below so the agent can
      # read route metadata but cannot rewrite the proxy's route table (R2-2).
      - type: bind
        source: /srv/first-agent/state
        target: /home/fa/.fa
        read_only: false
      # Single routing source. MUST come AFTER the /home/fa/.fa directory mount:
      # this nested ro file mount hides any legacy state/models.yaml from the
      # agent and preserves R2-2.
      - type: bind
        source: /srv/first-agent/routing/models.yaml
        target: /home/fa/.fa/models.yaml
        read_only: true
      # fa->proxy bootstrap token (read-only). NOT an LLM key — it only proves
      # this container is the agent so the proxy accepts its calls. LLM provider
      # keys are NEVER mounted into the agent container (ADR-12 Option C).
      - type: bind
        source: /srv/first-agent/secrets/fa_proxy_token
        target: /run/secrets/fa_proxy_token
        read_only: true
      # SSH deploy key (read-only) — cross-reference: mount at /run/secrets, not ~/.ssh
      - type: bind
        source: /srv/first-agent/secrets/github_deploy_key
        target: /run/secrets/git_key
        read_only: true
      # Pinned GitHub host key (mitigates host-key rotation outages)
      - type: bind
        source: /srv/first-agent/secrets/known_hosts
        target: /run/secrets/known_hosts
        read_only: true
      # Temporary writable layers
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 1G
      - type: tmpfs
        target: /home/fa/.cache
        tmpfs:
          size: 500M
      # UV cache (can be rebuilt)
      - type: tmpfs
        target: /tmp/uv-cache
        tmpfs:
          size: 2G
      # uv tool installs write to ~/.local/share/uv
      - type: tmpfs
        target: /home/fa/.local
        tmpfs:
          size: 500M

    # Network isolation
    networks:
      - fa-network

    # Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "fa --version >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Egress-injection proxy (ADR-12 Option C) — the LLM-key boundary.
  # This is the ONLY place LLM provider keys exist. It runs in a SEPARATE
  # container: the agent's fs.run_bash cannot read this container's filesystem
  # or process memory (separate mount/PID namespaces), so a fully compromised
  # agent can *use* a key (call through the proxy) but never *read* it.
  # No /workspace mount, no agent code reachable by the agent.
  # ---------------------------------------------------------------------------
  fa-egress-proxy:
    build:
      context: .
      dockerfile: Dockerfile.fa
    container_name: fa-egress-proxy
    hostname: fa-egress-proxy
    init: true
    # Self-heal transient faults on a 24/7 box (slow boot, brief config edit).
    # The earlier infinite crash-loop was a SYMPTOM of an image build bug (the
    # interpreter was unrunnable as non-root); with that fixed a correctly-built
    # image starts cleanly, so unless-stopped is the right unattended policy.
    # The healthcheck still reports `unhealthy` if the proxy can't serve.
    restart: unless-stopped
    command:
      - fa
      - egress-proxy
      - --models
      - /etc/fa/models.yaml
      - --secrets
      - /run/secrets/fa.env
      - --token-file
      - /run/secrets/fa_proxy_token
      - --listen
      - 0.0.0.0:8080

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
          pids: 128
        reservations:
          cpus: '0.25'
          memory: 64M

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # NO PYTHONPATH=/workspace/src here: the proxy must run the IMMUTABLE image
      # code from /opt/fa-venv, never agent-writable /workspace/src. (R2-1)

    volumes:
      # LLM provider keys (read-only) — ONLY mounted here, never in the agent.
      - type: bind
        source: /srv/first-agent/secrets/fa.env
        target: /run/secrets/fa.env
        read_only: true
      # fa->proxy token (read-only) — verifies the caller is the agent.
      - type: bind
        source: /srv/first-agent/secrets/fa_proxy_token
        target: /run/secrets/fa_proxy_token
        read_only: true
      # Single routing source. Both containers read the same file read-only;
      # only the host operator edits it. The proxy loads routes at startup, so
      # restart/recreate it after routing edits. (R2-2)
      - type: bind
        source: /srv/first-agent/routing/models.yaml
        target: /etc/fa/models.yaml
        read_only: true
      # NO /workspace mount: the proxy runs immutable image code only. (R2-1)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64M

    networks:
      - fa-network

    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz',timeout=3).status==200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fa-network:
    driver: bridge
    internal: false
